name: Build Electron Installer

# Triggers: manual button in GitHub UI, or any push that changes the electron-app
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'electron-app/**'
      - 'public/logo.jpeg'

jobs:
  build-windows:
    runs-on: windows-latest   # Windows runner = no symlink issues

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      # ── 3. Install deps ──────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      # ── 4. Build installer (.exe) ────────────────────────────────────────────
      - name: Build Windows installer
        working-directory: electron-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # no code signing cert needed
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      # ── 5. Upload as downloadable artifact ───────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Q4-Ingenieros-Setup
          path: electron-app/dist/*.exe
          retention-days: 30
          if-no-files-found: error
